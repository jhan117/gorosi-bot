name: 고로시 봇 v2

on:
  schedule:
    # 한국 시간(KST) 평일(월-금) 09:00 ~ 18:00 사이 매 시간 동작 (정시 트래픽 피하기 위해 27분으로 변경)
    # UTC 기준으로는 00:00 ~ 09:00 (월-금)
    - cron: '27 0-9 * * 1-5'
  workflow_dispatch:

# 동일 워크플로우 동시 실행 제어 (커밋 충돌 방지)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    
    # 레포지토리 자동 커밋을 위한 쓰기 권한 명시
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 의존성 설치 속도 단축을 위한 캐싱 활성화

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        PORTAL_ID: ${{ secrets.PORTAL_ID }}
        PORTAL_PW: ${{ secrets.PORTAL_PW }}
        PYTHONPATH: .
      run: python src/main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/bidx.json
        # 변경사항이 있을 때만 커밋 및 푸시
        if ! git diff-index --quiet HEAD; then
          git commit -m "Update last checked notice IDs [skip ci]"
          git push
        fi
